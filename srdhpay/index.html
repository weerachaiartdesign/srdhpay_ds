<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRDH PAY - เข้าสู่ระบบ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { prompt: ['Prompt', 'sans-serif'] },
          colors: {
            purple: {
              pastel: '#E9D5FF',
              light: '#D8B4FE',
              DEFAULT: '#A855F7',
              dark: '#7E22CE'
            }
          }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="font-prompt bg-gray-50 dark:bg-gray-900 min-h-screen flex items-center justify-center transition-colors">
  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8 max-w-md w-full mx-4">
    <!-- โลโก้ -->
    <div class="flex flex-col items-center mb-6">
      <img src="icons/logo_srdhpay-630.png" alt="SRDH PAY Logo" class="w-24 h-24 mb-3">
      <h1 class="text-2xl font-bold text-purple-dark dark:text-purple-light">SRDH PAY</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400">ระบบทะเบียนเบิกจ่ายเงิน โรงพยาบาลสิรินธร</p>
    </div>
    <!-- ฟอร์ม -->
    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Email</label>
        <input type="email" id="email" required 
          class="mt-1 w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 dark:bg-gray-700 dark:text-white">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Password</label>
        <input type="password" id="password" required 
          class="mt-1 w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 dark:bg-gray-700 dark:text-white">
      </div>
      <button type="submit" 
        class="w-full py-2 px-4 bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-lg shadow-md transition">
        เข้าสู่ระบบ
      </button>
    </form>
    <div class="mt-4 text-center">
      <button id="guestBtn" class="text-purple-600 dark:text-purple-400 hover:underline text-sm">
        เข้าใช้งานแบบผู้เยี่ยมชม
      </button>
    </div>
    <div class="mt-4 text-xs text-gray-400 text-center">
      SRDH PAY Version <span id="version"></span>
    </div>
  </div>
  <script src="js/api-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script>
    document.getElementById('version').textContent = APP_VERSION;
  </script>
</body>
</html>
